name: Documentation

on:
  push:
    paths:
      - "docs/**"
      - "sonolink/**"
    branches: [main]

  pull_request:
    paths:
      - "docs/**"
      - "sonolink/**"

  schedule:
    - cron: "0 0 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"
          check-latest: true

      - name: Install library and dependencies
        run: |
            python -m pip install -U pip
            pip install ".[docs]"

      - name: Compile Docs
        run: |
            cd docs
            make html
