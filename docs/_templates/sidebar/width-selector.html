<div class="sidebar-tree">
  <hr class="appearance-selector-separator" />
  <p class="caption width-selector-label" role="heading" aria-level="2">
    Content Width
  </p>
  <label class="width-option" for="standard-width-radio">
    <input
      type="radio"
      id="standard-width-radio"
      name="content-width"
      value="standard"
    />
    <span>Standard</span>
  </label>
  <label class="width-option" for="wide-width-radio">
    <input
      type="radio"
      id="wide-width-radio"
      name="content-width"
      value="wide"
    />
    <span>Wide</span>
  </label>
</div>
